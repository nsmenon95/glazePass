<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with glow -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bgGrad)" filter="url(#glow)" />
  
  <!-- Subtle glassmorphic inner shine -->
  <rect x="10" y="10" width="108" height="108" rx="26" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5" />
  
  <!-- Sleek White Lock Symbol -->
  <g fill="white" transform="translate(34, 30)">
    <!-- Shackle -->
    <path d="M30 4 C18.95 4 10 12.95 10 24 V34 H18 V24 C18 17.38 23.38 12 30 12 C36.62 12 42 17.38 42 24 V34 Z" opacity="0.9" />
    <!-- Lock Body -->
    <rect x="0" y="30" width="60" height="42" rx="12" fill="white" />
    <!-- Keyhole -->
    <circle cx="30" cy="48" r="5" fill="url(#bgGrad)" />
    <path d="M28 48 H32 L33 58 H27 Z" fill="url(#bgGrad)" />
  </g>
</svg>
